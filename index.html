<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
</head>

<body>
    <div>
        <form action="./login.html">
            <input type="text" name="name" placeholder="Enter Name" required><br><br>
            <input type="email" name="Email" placeholder="Enter Email" required><br><br>
            <input type="password" name="Password" placeholder="Enter Password" required><br><br>
    </div>
    <div>
        <input type="radio" name="gender" id="gmale" value="male">
        <label for="gmale">Male</label>
        <input type="radio" name="gender" id="gfemale" value="female">
        <label for="gfemale">Female</label>
    </div><br><br>
    <div>
        <input type="checkbox" value="10th">10th
        <input type="checkbox" value="12th">12th
        <input type="checkbox" value="Diploma">Diploma
        <input type="checkbox" value="B.tech">B.tech
    </div><br><br>
    <div>
        <select>
            <option value="">Select Your City</option>
            <option value="Banglore">Banglore</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Chennai">Chennai</option>
            <option value="Mumbai">Mumbai</option>
        </select>
    </div><br><br>
    <div>
        <textarea placeholder="Enter your address"></textarea required>
    </div><br><br>
    <div>
        <label for="">Date of birth</label>
        <input type="date" name="" id="" required>
    </div><br><br>
    <div>
        <label for="">Profile pic</label>
        <input type="file" required>
    </div><br><br>
    <button>Submit</button>
    </form>
</body>

</html>
